<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/styles.css">
    <script src="scripts/menu.js" defer></script>
    <title>Happy Taco Menu</title>
</head>

<body>
    <header class="header">
        <div class="logo">
            <img src="/img/ChatGPT Image Apr 20, 2026, 10_19_19 PM.png" class="headerLogo">
            <!-- <span>HAPPY TACO</span> -->
        </div>

        <nav class="nav">
            <a href="/index.html">Home</a>
            <a href="/menu.html">Menu</a>
            <a href="/about.html">About</a>
            <a href="/locations.html">Location</a>

            <a href="#">Contact</a>
        </nav>

        <button class="order-btn">Order Now</button>
    </header>

    <section class="menu-hero">
        <h1>Our Menu</h1>
        <p>Fresh tacos, classic sides, and good vibes.</p>
    </section>

    <section class="menu-section">
        <div class="menu-container">

            <div class="menu-category">
                <h2>Tacos</h2>
                <div class="menu-list tacos-list">
                    <!-- Entree items will be added here by JavaScript -->
                </div>

            </div>

            <div class="menu-side-image">
                <img src="/img/close-up-delicious-tacos.jpg" alt="Taco plate">
            </div>

        </div>
    </section>

    <section class="menu-section alt-bg">
        <div class="menu-container">

            <div class="menu-side-image">
                <img src="/img/guacamole-with-tortilla-chips-stone-bowl.jpg" alt="Street corn and sides">
            </div>

            <div class="menu-category">
                <h2>Sides</h2>

                <div class="menu-list sides-list">
                    <!-- Side items will be added here by JavaScript -->
                </div>
            </div>

        </div>
    </section>

    <section class="menu-section">
        <div class="menu-container">

            <div class="menu-category">
                <h2>Fun Drinks</h2>

                <div class="menu-list drinks-list">
                    <!-- Drink items will be added here by JavaScript -->
                </div>

            </div>

            <div class="menu-side-image">
                <img src="/img/bright-icy-cocktail-with-fresh-strawberries-mint.jpg" alt="Fun drinks">
            </div>

        </div>
    </section>

    <section class="menu-cta">
        <h2>Ready to grab a taco?</h2>
        <a href="locations.html" class="pink-btn-inline">Find Our Truck</a>
    </section>

    <footer class="site-footer">
        <div class="footer-content">
            <p>&copy; Happy Taco</p>

            <nav class="footer-links">
                <a href="/menu.html">Menu</a>
                <a href="/locations.html">Events</a>
                <a href="/admin.html">Admin</a>
            </nav>
        </div>
    </footer>

</body>

</html>
